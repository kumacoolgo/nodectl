{{define "update_modal.html"}}
<style>
    /* 更新弹窗遮罩 */
    .update-modal-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.4); 
        backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        z-index: 4000; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.3s ease;
        /* 移除这里的 overscroll-behavior，移到内容容器中 */
    }
    .update-modal-overlay.active { display: flex; opacity: 1; }
    
    /* 弹窗卡片容器 */
    .update-modal-card {
        background: #ffffff; width: 100%; max-width: 500px; 
        border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        transform: scale(0.95); transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        display: flex; flex-direction: column; 
        /* 关键：设定高度限制，让内部的内容可以滚动 */
        height: auto; max-height: 80vh; 
        overflow: hidden;
    }
    .update-modal-overlay.active .update-modal-card { transform: scale(1); }

    /* 头部样式优化 */
    .update-header {
        padding: 16px 20px; border-bottom: 1px solid #f0f0f5;
        display: flex; justify-content: space-between; align-items: center;
        flex-shrink: 0; /* 防止头部被压缩 */
    }
    .update-header-left {
        display: flex; align-items: center; gap: 15px;
    }
    .update-title { 
        font-size: 18px; color: #1d1d1f; font-weight: 700; 
        display: flex; align-items: center; gap: 8px;
    }

    /* 新版 GitHub 链接样式 */
    .github-link {
        display: flex; align-items: center; text-decoration: none;
        transition: opacity 0.2s; cursor: pointer;
    }
    .github-link:hover { opacity: 0.7; }
    
    /* 更立体的蓝色 GitHub 图标 */
    .github-icon-svg {
        width: 24px; height: 24px; color: #007aff; /* 使用苹果蓝 */
        filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1)); /* 添加轻微投影增加立体感 */
    }
    
    /* NodeCTL 文字样式 */
    .nodectl-text {
        font-size: 16px; font-weight: 700; color: #007aff;
        margin-left: 6px; letter-spacing: 0.5px;
        text-shadow: 0 1px 1px rgba(0,0,0,0.05); /* 轻微文字投影 */
    }

    /* 关闭按钮样式 */
    .update-close-btn {
        background: transparent; border: none; color: #86868b;
        cursor: pointer; padding: 6px; border-radius: 8px; display: flex; transition: 0.2s;
        flex-shrink: 0;
    }
    .update-close-btn:hover { background: #f2f2f7; color: #1d1d1f; }

    /* 更新日志滚动区域 - 核心滚动修复 */
    .update-body {
        padding: 0; 
        flex: 1; /* 占据剩余空间 */
        overflow-y: auto; /* 开启垂直滚动 */
        scrollbar-width: thin; scrollbar-color: #e5e5ea transparent;
        -webkit-overflow-scrolling: touch; /* 优化 iOS 滚动体验 */
        /* 防止滚动链传递给底层 body，放在这里更合适 */
        overscroll-behavior: contain; 
    }
    .update-body::-webkit-scrollbar { width: 6px; }
    .update-body::-webkit-scrollbar-thumb { background: #e5e5ea; border-radius: 4px; }

    /* 单条更新记录样式 */
    .release-item {
        padding: 20px 25px; border-bottom: 1px solid #f5f5f7;
    }
    .release-item:last-child { border-bottom: none; }
    
    .release-header {
        display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
    }
    .release-version { font-size: 17px; font-weight: 700; color: #007aff; }
    .release-date { font-size: 13px; color: #86868b; }
    
    .release-body {
        font-size: 14px; color: #333; line-height: 1.7;
        word-wrap: break-word;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    
    /* Markdown 样式优化 */
    .release-body strong { font-weight: 600; color: #1d1d1f; }
    .release-body ul { padding-left: 20px; margin: 10px 0; }
    .release-body li { margin-bottom: 6px; }

    /* 顶部版本标签样式 (保持不变) */
    .top-version-badge {
        display: inline-flex; align-items: center; gap: 4px;
        background: #f0f0f5; color: #555; padding: 4px 10px;
        border-radius: 20px; font-size: 12px; font-weight: 600;
        cursor: pointer; transition: all 0.2s; user-select: none;
        margin-left: 10px; vertical-align: middle;
    }
    .top-version-badge:hover { background: #e5e5ea; }
    .top-version-badge.has-update {
        background: #fff0f0; color: #d73a49; border: 1px solid #ffdfdf;
    }
    .top-version-badge.has-update:hover { background: #ffe5e5; }
    .update-arrow-icon {
        animation: floatUp 1.5s ease-in-out infinite;
    }
    .top-version-badge.has-update .update-arrow-icon { 
        display: flex !important; 
    }
    @keyframes floatUp {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
    }
    
    /* 底部加载指示器 */
    .update-loading { padding: 25px; text-align: center; color: #86868b; font-size: 13px; line-height: 1.6;}

    /* ✨ 移动端适配 */
    @media (max-width: 768px) {
        .update-modal-card { 
            max-width: 92%; /* 稍微加宽一点 */
            max-height: 85vh; 
        }
        .update-header {
            padding: 14px 18px;
        }
        .update-title { font-size: 17px; }
        .nodectl-text { font-size: 15px; }
    }
</style>

<div class="update-modal-overlay" id="updateModal">
    <div class="update-modal-card">
        <div class="update-header">
            <div class="update-header-left">
                <div class="update-title">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#007aff;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    更新日志
                </div>
                <a href="https://github.com/hobin66/nodectl" target="_blank" class="github-link" title="访问 GitHub 项目主页">
                    <svg class="github-icon-svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    <span class="nodectl-text">NodeCTL</span>
                </a>
            </div>
            <button class="update-close-btn" onclick="closeUpdateModal()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        
        <div class="update-body" id="updateBody">
            <div id="releaseList"></div>
            <div id="loadingStatus" class="update-loading" style="display: none;"></div>
        </div>
    </div>
</div>

<script>
    // GitHub API 配置
    const GITHUB_API_BASE = "https://api.github.com/repos/hobin66/nodectl/releases";
    const PER_PAGE = 5; // 增加每次加载的数量，确保能撑满高度以触发滚动

    let RAW_VERSION = "{{.Version}}";
    if (RAW_VERSION === "dev" || RAW_VERSION === "") {
        RAW_VERSION = "v1.0.0"; // 默认开发版本号
    }
    const DISPLAY_VERSION = RAW_VERSION.replace(/^v/, '');

    // 状态管理
    let currentPage = 1;
    let hasMore = true;
    let isFetching = false;
    let allReleases = [];

    // 版本比对工具函数
    function isNewVersionAvailable(current, latest) {
        if (!current || !latest) return false;
        const cleanCurrent = current.replace(/^v/, '');
        const cleanLatest = latest.replace(/^v/, '');
        // 简单对比：只要字符串不相等就认为是新版本 (生产环境建议用更严谨的 semver 对比库)
        return cleanCurrent !== cleanLatest;
    }

    // 加载发布记录的核心函数
    async function loadReleases(page) {
        if (isFetching || !hasMore) return;
        isFetching = true;

        const statusEl = document.getElementById('loadingStatus');
        statusEl.style.display = "block";
        statusEl.innerHTML = page === 1 ? "正在拉取最新数据..." : "正在加载更多历史记录...";

        try {
            // 发起请求
            const res = await fetch(`${GITHUB_API_BASE}?per_page=${PER_PAGE}&page=${page}`);
            
            if (!res.ok) {
                if (res.status === 403) statusEl.innerHTML = "请求过于频繁，请稍后再试 (GitHub API 限制)。";
                else if (res.status === 404) statusEl.innerHTML = "未找到任何发布记录。";
                else statusEl.innerHTML = `数据请求失败 (HTTP ${res.status})`;
                hasMore = false; // 出错后停止继续加载
                return;
            }
            
            const data = await res.json();
            // 如果返回的数据少于每页数量，说明没有更多数据了
            if (data.length < PER_PAGE) hasMore = false;

            if (page === 1) {
                // 第一页加载时清空现有列表
                document.getElementById('releaseList').innerHTML = "";
                allReleases = [];
                if (data.length === 0) {
                    statusEl.innerHTML = `暂无版本更新记录<br><span style="font-size:12px;opacity:0.7;">(GitHub 仓库尚未发布 Release)</span>`;
                    hasMore = false;
                    return;
                }
            }

            allReleases = allReleases.concat(data);

            // 检查是否有新版本 (仅在第一页检查)
            if (page === 1 && data.length > 0) {
                const latestRelease = data[0];
                if (isNewVersionAvailable(RAW_VERSION, latestRelease.tag_name)) {
                    const badge = document.getElementById('topVersionBadge');
                    if (badge) {
                        badge.classList.add('has-update');
                        const cleanLatest = latestRelease.tag_name.replace(/^v/, '');
                        badge.title = `发现新版本: ${cleanLatest}，点击查看更新日志`;
                    }
                }
            }

            // 渲染数据
            renderAppend(data);

            // 更新底部状态文字
            if (hasMore) {
                statusEl.innerHTML = "下滑加载更多...";
            } else {
                statusEl.innerHTML = "已加载全部历史记录";
                // 延迟隐藏状态条，让用户看到提示
                setTimeout(() => { statusEl.style.display = "none"; }, 2000);
            }
            currentPage++;

        } catch (e) {
            console.error("加载更新失败:", e);
            statusEl.innerHTML = "网络请求失败，无法连接到 GitHub。";
            hasMore = false;
        } finally {
            isFetching = false;
        }
    }

    // 简单的 Markdown 解析器
    function parseReleaseBody(body) {
        if (!body) return "<span style='color:#999;'>此版本无详细说明。</span>";
        
        // ✨ 核心修复：抹除 Windows 系统的 \r 回车符，防止产生双重换行
        let html = body.replace(/\r/g, '');

        // 转义 HTML 以防止 XSS
        html = html.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        
        // 处理标题
        html = html.replace(/^### (.*$)/gm, '<strong>$1</strong>');
        html = html.replace(/^## (.*$)/gm, '<strong style="font-size:15px;">$1</strong>');
        
        // 处理列表项 (将 * 或 - 开头的行转换为列表)
        html = html.replace(/^[\*\-] (.*$)/gm, '<div style="display:flex;gap:6px;margin-bottom:4px;"><span style="color:#007aff;">•</span><span>$1</span></div>');
        
        // 处理强调/加粗
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        // 处理代码块
        html = html.replace(/`(.*?)`/g, '<code style="background:#f0f0f5;padding:2px 4px;border-radius:4px;font-family:monospace;font-size:13px;">$1</code>');
        
        // ✨ 核心修复：防止在块级元素 </div> 之后追加 <br> 导致原生无序列表多出空行
        html = html.replace(/<\/div>\n/g, '</div>');

        // 将剩余的换行符转换为 <br>
        return html.replace(/\n/g, '<br>');
    }

    // 将新数据追加到列表中
    function renderAppend(items) {
        const list = document.getElementById('releaseList');
        let html = "";
        items.forEach(release => {
            let dateStr = "未知日期";
            try {
                dateStr = new Date(release.published_at).toLocaleDateString('zh-CN', {year:'numeric', month:'2-digit', day:'2-digit'});
            } catch(e) {}
            
            const displayTag = release.tag_name.replace(/^v/, ''); 
            
            html += `
                <div class="release-item">
                    <div class="release-header">
                        <span class="release-version">v${displayTag}</span>
                        <span class="release-date">${dateStr}</span>
                    </div>
                    <div class="release-body">${parseReleaseBody(release.body)}</div>
                </div>
            `;
        });
        // 使用 insertAdjacentHTML 在末尾高效插入新内容
        list.insertAdjacentHTML('beforeend', html);
    }

    // 点击遮罩层关闭
    document.getElementById('updateModal').addEventListener('click', function(e) {
        if (e.target === this) closeUpdateModal();
    });

    // ESC 键关闭
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && document.getElementById('updateModal').classList.contains('active')) closeUpdateModal();
    });

    // 打开弹窗
    function openUpdateModal() {
        const modal = document.getElementById('updateModal');
        modal.classList.add('active');
        // 锁定 body 滚动，防止穿透
        document.body.style.overflow = 'hidden'; 
        
        // 如果是第一次打开且没有数据，则开始加载
        if (allReleases.length === 0 && !isFetching && hasMore) {
            loadReleases(1);
        }
    }

    // 关闭弹窗
    function closeUpdateModal() {
        document.getElementById('updateModal').classList.remove('active');
        // 恢复 body 滚动
        document.body.style.overflow = ''; 
    }

    // 初始化逻辑
    document.addEventListener("DOMContentLoaded", () => {
        // 设置主页版本号显示
        const badgeText = document.getElementById('versionText');
        if (badgeText) {
            badgeText.innerText = DISPLAY_VERSION;
            badgeText.style.opacity = '1';
        }

        const badge = document.getElementById('topVersionBadge');
        if (badge && !badge.classList.contains('has-update')) {
            badge.title = "当前版本: " + DISPLAY_VERSION + " (点击查看历史)";
        }

        // 绑定无限滚动事件
        const bodyContainer = document.getElementById('updateBody');
        if (bodyContainer) {
            bodyContainer.addEventListener('scroll', function() {
                // 滚动条距离底部小于 30px 时触发加载
                const isNearBottom = this.scrollTop + this.clientHeight >= this.scrollHeight - 30;
                if (isNearBottom && hasMore && !isFetching) {
                    loadReleases(currentPage);
                }
            });
        }
    });
</script>
{{end}}
