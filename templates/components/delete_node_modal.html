{{define "delete_node_modal.html"}}
<div id="deleteModal" class="delete-modal-overlay" style="display: none;">
    <div class="delete-modal-content">
        <h3 class="delete-modal-title">删除确认</h3>

        <div class="delete-modal-body">
            确定要删除该节点吗？此操作无法撤销。
        </div>

        <div class="delete-modal-actions">
            <button class="btn-cancel" onclick="closeDeleteModal()">取消</button>
            <button class="btn-confirm-delete" onclick="confirmDeleteNode()">确认删除</button>
        </div>
    </div>
</div>

<style>
    /* 【关键修改】：将 .modal-overlay 改名为 .delete-modal-overlay */
    /* 这样就不会跟 add_node_modal.html 里的样式打架了 */
    .delete-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        /* 这里的 flex 只会影响拥有 delete-modal-overlay 类的元素 */
        align-items: center;
        justify-content: center;
        z-index: 3000;
        /* 提高一点层级，确保在最上层 */
        backdrop-filter: blur(2px);
    }

    /* 弹窗主体 */
    .delete-modal-content {
        background: #fff;
        width: 320px;
        /* 删除弹窗可以稍微小一点 */
        max-width: 90%;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        animation: deletePop 0.2s ease-out;
    }

    .delete-modal-title {
        font-size: 18px;
        font-weight: 700;
        color: #1d1d1f;
        margin-bottom: 15px;
    }

    .delete-modal-body {
        font-size: 14px;
        color: #555;
        margin-bottom: 25px;
        line-height: 1.5;
    }

    /* 按钮容器 */
    .delete-modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
    }

    /* 取消按钮 */
    .btn-cancel {
        background: #f5f5f7;
        color: #1d1d1f;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
    }

    .btn-cancel:hover {
        background: #e5e5ea;
    }

    /* 确认删除按钮 */
    .btn-confirm-delete {
        background: #d74242;
        /* 红色 */
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.2s;
    }

    .btn-confirm-delete:hover {
        opacity: 0.9;
    }

    @keyframes deletePop {
        from {
            transform: scale(0.95);
            opacity: 0;
        }

        to {
            transform: scale(1);
            opacity: 1;
        }
    }
</style>

<script>
    // 点击遮罩层关闭
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) closeDeleteModal();
    });

    // ESC 键关闭
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const modal = document.getElementById('deleteModal');
            if (modal && modal.style.display !== 'none') closeDeleteModal();
        }
    });
</script>
{{end}}
